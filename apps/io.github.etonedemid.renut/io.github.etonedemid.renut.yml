app-id: io.github.etonedemid.renut
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: io.github.etonedemid.renut.sh

finish-args:
  # hardware 3D and controller access
  - --device=all
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # - --socket=wayland
  # - --socket=fallback-x11
  # Audio
  - --socket=pulseaudio
  # Gamescope for SteamOS
  - --filesystem=xdg-run/gamescope-0:ro

modules:
  - name: recomp
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/etonedemid/reNut/releases/download/v1.0.3/reNut-x86_64.AppImage
        dest-filename: renut.appimage
        sha256: 659b9b8186b40b26a8748a2c04b2336ea8ce97b99cdd546dbdc55ef19bfe5fa8
        # x-checker-data:
        #   type: json
        #   url: https://api.github.com/repos/etonedemid/renut/releases
        #   version-query: .[0].tag_name
        #   url-query: .[0].assets[] | select(.name | test("^reNut.*x86_64.AppImage$")).browser_download_url
      - type: file
        path: io.github.etonedemid.renut.metainfo.xml
      - type: file
        path: io.github.etonedemid.renut.sh
    build-commands:
      - chmod a+x renut.appimage
      - ./renut.appimage --appimage-extract
      - install -D -m644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - desktop-file-edit --set-key=Exec --set-value=${FLATPAK_ID}.sh squashfs-root/renut.desktop
      - desktop-file-edit --set-key=Icon --set-value=${FLATPAK_ID} squashfs-root/renut.desktop
      - install -D -m644 squashfs-root/renut.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -D -m644 squashfs-root/renut.png /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      - install -D -m755 squashfs-root/usr/bin/extract-xiso -t /app/bin/
      - install -D -m755 squashfs-root/usr/bin/renut -t /app/bin/
      - sed -i s/"^mnk_mode = true$"// squashfs-root/usr/bin/renut.toml
      - install -D -m755 squashfs-root/usr/bin/renut.toml /app/bin/renut.toml
      - install -D -m755 ${FLATPAK_ID}.sh -t /app/bin/
