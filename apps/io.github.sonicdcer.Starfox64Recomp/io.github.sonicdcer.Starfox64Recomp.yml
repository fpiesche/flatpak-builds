app-id: io.github.sonicdcer.Starfox64Recomp
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: io.github.sonicdcer.Starfox64Recomp.sh

finish-args:
  # hardware 3D and controller access
  - --device=all
  # X11 + XShm access
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # Audio
  - --socket=pulseaudio
  # Gamescope for SteamOS
  - --filesystem=xdg-run/gamescope-0:ro

modules:
  - name: sf64recomp
    buildsystem: simple
    sources:
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/sonicdcer/Starfox64Recomp/releases/download/1.0.3/Starfox64Recompiled-v1.0.3-Linux-ARM64-Release.zip
        dest-filename: sf64recomp.zip
        sha256: 85408daa5ceac1fc208a744b0a35fb316c417d62c709761aceb242353fb2a1c0
        x-checker-data:
          type: json
          url: https://api.github.com/repos/sonicdcer/Starfox64Recomp/releases
          version-query: .tag_name
          url-query: .assets[] | select(.name | test("^Starfox64Recompiled-.*-Linux-ARM64-Release.zip$")).browser_download_url
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/sonicdcer/Starfox64Recomp/releases/download/1.0.3/Starfox64Recompiled-v1.0.3-Linux-X64-Release.zip
        dest-filename: sf64recomp.zip
        sha256: e74932bd0edb6186a015dabaa87b6b24af3d3b5511ff3b0293a2c3331840cdf0
        x-checker-data:
          type: json
          url: https://api.github.com/repos/sonicdcer/Starfox64Recomp/releases
          version-query: .tag_name
          url-query: .assets[] | select(.name | test("^Starfox64Recompiled-.*-Linux-X64-Release.zip$")).browser_download_url
    build-commands:
      - tar xf Starfox64Recompiled.tar.gz
      - install -D -m755 Starfox64Recompiled -t /app/bin/
      - install -D -m644 recompcontrollerdb.txt -t /app/bin/
      - cp -rv assets /app/bin/

  - name: freedesktop
    buildsystem: simple
    sources:
      - type: archive
        url: https://api.github.com/repos/sonicdcer/Starfox64Recomp/tarball/1.0.3
        dest-filename: sf64recomp.tar.gz
        sha256: 97c70fad38476b8b9402c19f2407158316f30c3aafe477a531515c6a9e6ce56e
        x-checker-data:
          type: json
          url: https://api.github.com/repos/sonicdcer/Starfox64Recomp/releases
          version-query: .[0].tag_name | sub("^v"; "")
          url-query: .[0].tarball_url
      - type: file
        path: io.github.sonicdcer.Starfox64Recomp.metainfo.xml
      - type: script
        dest-filename: io.github.sonicdcer.Starfox64Recomp.sh
        commands:
          - export APP_FOLDER_PATH="${XDG_DATA_HOME}/${FLATPAK_ID}"
          - if [[ ! -d "${APP_FOLDER_PATH}" ]]; then mkdir -p ${APP_FOLDER_PATH}; fi
          - cd /app/bin/
          - Starfox64Recompiled
    build-commands:
      # desktop file
      - desktop-file-edit --set-key=Icon --set-value=${FLATPAK_ID} flatpak/io.github.starfox64recomp.starfox64recomp.desktop
      - install -D -m644 flatpak/io.github.starfox64recomp.starfox64recomp.desktop /app/share/applications/${FLATPAK_ID}.desktop
      # icon
      - install -D -m644 icons/512.png /app/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      # metainfo
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      # launcher script
      - install -D -m755 ${FLATPAK_ID}.sh -t /app/bin/
