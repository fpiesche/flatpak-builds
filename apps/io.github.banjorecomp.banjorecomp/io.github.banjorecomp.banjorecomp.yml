app-id: io.github.banjorecomp.banjorecomp
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: io.github.banjorecomp.banjorecomp.sh

finish-args:
  # hardware 3D and controller access
  - --device=all
  # X11 + XShm access
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # Audio
  - --socket=pulseaudio
  # Gamescope for SteamOS
  - --filesystem=xdg-run/gamescope-0:ro

build-options:
  strip: true
  no-debuginfo: true

modules:
  - name: recomp
    buildsystem: simple
    sources:
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/BanjoRecomp/BanjoRecomp/releases/download/v1.0.1/BanjoRecompiled-v1.0.1-Linux-ARM64.zip
        dest-filename: recomp.zip
        sha256: 81be04f4027df8618e5788849789664a29086c6dc3409ebabf115a791d003faf
        x-checker-data:
          type: json
          url: https://api.github.com/repos/BanjoRecomp/BanjoRecomp/releases
          version-query: .[0].tag_name
          url-query: .[0].assets[] | select(.name | test("^BanjoRecompiled.*Linux-ARM64.*.zip$")).browser_download_url
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/BanjoRecomp/BanjoRecomp/releases/download/v1.0.1/BanjoRecompiled-v1.0.1-Linux-X64.zip
        dest-filename: recomp.zip
        sha256: e315303c34f4e5fa54fa4b507a63fb19766182a257b5b50302bb8d7a7b1847a6
        x-checker-data:
          type: json
          url: https://api.github.com/repos/BanjoRecomp/BanjoRecomp/releases
          version-query: .[0].tag_name
          url-query: .[0].assets[] | select(.name | test("^BanjoRecompiled.*Linux-X64.*.zip$")).browser_download_url
    build-commands:
      - tar -xf BanjoRecompiled.tar.gz --no-same-owner
      - install -D -m755 BanjoRecompiled -t /app/bin/
      - install -D -m644 recompcontrollerdb.txt -t /app/bin/
      - cp -rv assets /app/bin/

  - name: freedesktop
    buildsystem: simple
    sources:
      - type: archive
        url: https://api.github.com/repos/BanjoRecomp/BanjoRecomp/tarball/v1.0.1
        dest-filename: repo.tar.gz
        sha256: 639b0c336580383ac8cfa61a537525692f015f38e0d5468370d4d0c47a87d24f
        x-checker-data:
          type: json
          url: https://api.github.com/repos/BanjoRecomp/BanjoRecomp/releases
          version-query: .[0].tag_name | sub("^v"; "")
          url-query: .[0].tarball_url
      - type: file
        path: io.github.banjorecomp.banjorecomp.metainfo.xml
      - type: script
        dest-filename: io.github.banjorecomp.banjorecomp.sh
        commands:
          - export APP_FOLDER_PATH="${XDG_DATA_HOME}/${FLATPAK_ID}"
          - if [[ ! -d "${APP_FOLDER_PATH}" ]]; then mkdir -p ${APP_FOLDER_PATH}; fi
          - cd /app/bin/
          - BanjoRecompiled
    build-commands:
      # desktop file
      - desktop-file-edit --set-key=Exec --set-value=${FLATPAK_ID}.sh flatpak/io.github.banjorecomp.banjorecomp.desktop
      - desktop-file-edit --set-key=Icon --set-value=${FLATPAK_ID} flatpak/io.github.banjorecomp.banjorecomp.desktop
      - install -D -m644 flatpak/io.github.banjorecomp.banjorecomp.desktop /app/share/applications/${FLATPAK_ID}.desktop
      # icon
      - install -D -m644 icons/app.png /app/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      # metainfo
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      # launcher script
      - install -D -m755 ${FLATPAK_ID}.sh -t /app/bin/
