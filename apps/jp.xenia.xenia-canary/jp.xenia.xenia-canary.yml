app-id: jp.xenia.xenia-canary
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: jp.xenia.xenia-canary.sh

sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20

finish-args:
  # gamepad+DRI support
  - --device=all
  # GUI access
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Audio
  - --socket=pulseaudio

cleanup:
  - /bin/spirv*
  - /bin/glslangValidator
  - /lib/libSPIRV*
  - /lib/pkgconfig
  - /lib/cmake

modules:
  - name: spirv-tools
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSPIRV_SKIP_TESTS=ON
      - -DSPIRV_HEADERS_ENABLE_TESTS=OFF
    sources:
      - type: archive
        url: https://api.github.com/repos/KhronosGroup/SPIRV-Tools/zipball/refs/tags/vulkan-sdk-1.4.341.0
        sha256: 5ba66e114d5805a50d83c65f6b1d4874b4189e23849bd1ec390db2f901a61fbd
        dest-filename: spirv-tools.zip
        x-checker-data:
          type: json
          url: https://api.github.com/repos/KhronosGroup/SPIRV-Tools/tags
          version-query: .[0].name | sub("vulkan-sdk-"; "")
          url-query: .[0].zipball_url
      - type: archive
        url: https://api.github.com/repos/KhronosGroup/SPIRV-Headers/zipball/refs/tags/vulkan-sdk-1.4.341.0
        sha256: 8fbbd9461514ac9ea324e72bc6ff763d574cb085da1bb7c2759cb585382b38df
        dest-filename: spirv-headers.zip
        dest: external/spirv-headers
        x-checker-data:
          type: json
          url: https://api.github.com/repos/KhronosGroup/SPIRV-Headers/tags
          version-query: .[0].name | sub("vulkan-sdk-"; "")
          url-query: .[0].zipball_url
    post-install:
      - ln -s /usr/bin/glslangValidator /app/bin/glslangValidator
  - name: xenia-canary
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      append-path: /usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
    config-opts:
      - -DCMAKE_C_COMPILER=clang
      - -DCMAKE_CXX_COMPILER=clang++
      - -DCMAKE_LINKER=ldd
      - -DCMAKE_CXX_FLAGS=-Wno-unused-result
    sources:
      - type: git
        url: https://github.com/xenia-canary/xenia-canary
        commit: 883c2030d06dfb4f83f4fbe8ac75dad9e61ae911
        x-checker-data:
          type: json
          url: https://api.github.com/repos/xenia-canary/xenia-canary/branches/canary_experimental
          commit-query: .commit.sha
      - type: patch
        path: jp.xenia.xenia-canary.get-git-hash.patch
      - type: file
        path: version.h.in
      - type: file
        path: jp.xenia.xenia-canary.desktop
      - type: file
        path: jp.xenia.xenia-canary.metainfo.xml
      - type: script
        dest-filename: jp.xenia.xenia-canary.sh
        commands:
          - xenia_canary --storage_root=$XDG_DATA_HOME --content_root=$XDG_DATA_HOME/content
            --cache_root=$XDG_CACHE_HOME/xenia --mount_cache=false $@
    post-install:
      - install -Dm644 ${FLATPAK_BUILDER_BUILDDIR}/assets/icon/256.png /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      - install -Dm755 ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.sh -t /app/bin/
      - install -Dm755 ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.desktop -t /app/share/applications/
      - install -Dm755 ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
