app-id: horse.msx.eos
runtime: org.freedesktop.Platform
sdk: org.freedesktop.Sdk
runtime-version: '25.08'
command: eos

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # 3D hardware acceleration
  - --device=dri
  # Audio
  - --socket=pulseaudio
  # Controller support - change to device=input once Flatpak 1.14 is EOL.
  # https://discourse.flathub.org/t/support-for-device-input/6645
  - --device=all
  # Allow network for multiplayer gameplay
  - --share=network

cleanup:
  - '*.a'
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - /bin/7zz

modules:
  - ../shared-modules/linux-audio/libinstpatch.json
  - ../shared-modules/linux-audio/fluidsynth2.json

  - name: zmusic
    buildsystem: cmake-ninja
    build-options:
      no-debuginfo: true
      strip: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/UZDoom/ZMusic/archive/1.3.0.tar.gz
        sha256: 2eccd41e1cc9b38b3729ab94d65635719b2adc916de4ca9f8399ebceaee89f7f
        x-checker-data:
          type: anitya
          project-id: 153600
          stable-only: true
          url-template: https://github.com/UZDoom/ZMusic/archive/$version.tar.gz
      - type: archive
        url: https://www.un4seen.com/files/unmo3lib.zip
        sha256: d5d9bfcb7df8e7dd0eaa3bdf9a01b794ba7af4b21d70839932ba02405c024e9a
        dest: thirdparty/unmo3lib
        strip-components: 0
      - type: patch
        paths:
          - org.zdoom.zmusic.unmo3.patch

  - name: zdoom-eos
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_CXX_FLAGS=-DSHARE_DIR=\"/app/share\"
    sources:
      - type: git
        url: https://github.com/fpiesche/UZDoom
        branch: eos
        commit: 936da74231d1125075f8c52c4fb54dc4750792dc
        x-checker-data:
          type: json
          url: https://api.github.com/repos/fpiesche/UZDoom/branches/eos
          commit-query: .commit.sha

  - name: 7zip
    buildsystem: simple
    subdir: CPP/7zip/Bundles/Alone2
    build-commands:
      - make -j $FLATPAK_BUILDER_N_JOBS -f makefile.gcc
      - install -D ./_o/7zz -t /app/bin
    sources:
      - type: git
        url: https://github.com/ip7z/7zip.git
        tag: '26.01'
        commit: 8c63d71ff886bda90c86db28466287f977374237
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: eos-data
    buildsystem: simple
    subdir: Data
    sources:
      - type: archive
        url: https://msx.horse/eos/eos_v1_5.zip
        sha256: fb00bb73521d3bf3c92b7ef52f337c037cb4ab0724873f78ae68b3bbc7483351
    build-commands:
      - 7zz x data2.eos && cd data && zip -r /app/share/games/eos/eos.ipk3 *
      - 7zz x data1.eos && zip -r /app/share/games/eos/eos.ipk3 maps
