app-id: dev.twilitrealm.dusklight
runtime: org.freedesktop.Platform
runtime-version: &runtime-version '25.08'
sdk: org.freedesktop.Sdk
command: dev.twilitrealm.dusklight.sh

finish-args:
  # hardware 3D and gamepads
  - --device=all
  # Audio
  - --socket=pulseaudio
  # desktop
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # Discord RPC
  - --filesystem=xdg-run/app/com.discordapp.Discord:create

modules:
  - name: dusklight
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/TwilitRealm/dusklight/releases/download/v1.3.0/Dusklight-v1.3.0-linux-x86_64.AppImage
        dest-filename: Dusklight.AppImage
        sha256: 0e2a3b759dd05fdd76eb59d0cb756322c10d3acb83a80af4af818dbb7eaf2e40
        x-checker-data:
          type: json
          url: https://api.github.com/repos/TwilitRealm/dusklight/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name | test("^Dusklight-.*-linux-x86_64.AppImage$")).browser_download_url
      - type: file
        path: dev.twilitrealm.dusklight.metainfo.xml
      - type: script
        dest-filename: dev.twilitrealm.dusklight.sh
        commands:
          - |
            for i in {0..9}; do
              test -S $XDG_RUNTIME_DIR/discord-ipc-$i || ln -sf {app/com.discordapp.Discord,$XDG_RUNTIME_DIR}/discord-ipc-$i;
            done
          - dusklight
    build-commands:
      - chmod +x Dusklight.AppImage
      - ./Dusklight.AppImage --appimage-extract
      - desktop-file-edit --set-key=Icon --set-value=${FLATPAK_ID} squashfs-root/dev.twilitrealm.dusk.desktop
      - install -D -m644 squashfs-root/dev.twilitrealm.dusk.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -D -m644 squashfs-root/usr/share/icons/hicolor/256x256/apps/dev.twilitrealm.dusk.png
        /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      - install -D -m644 ${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -D -m755 ${FLATPAK_ID}.sh -t /app/bin/
      - mv -v squashfs-root/usr/bin/* /app/bin/
