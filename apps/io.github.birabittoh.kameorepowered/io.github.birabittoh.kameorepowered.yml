app-id: io.github.birabittoh.kameorepowered
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: io.github.birabittoh.kameorepowered.sh

finish-args:
  # hardware 3D and controller access
  - --device=all
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # - --socket=wayland
  # - --socket=fallback-x11
  # Audio
  - --socket=pulseaudio
  # Gamescope for SteamOS
  - --filesystem=xdg-run/gamescope-0:ro

modules:
  - name: extract-xiso
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/rikyperdana/extract-xiso/raw/refs/heads/master/extract-xiso
        dest-filename: extract-xiso
        sha256: ee065965c2f8c73d924973e422f10537d8eecd5e83e5914fa20b4721411fec52
    build-commands:
      - install -D -m755 extract-xiso -t /app/bin/

  - name: recomp
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/birabittoh/KameoRePowered/releases/download/v0.2.0/kameorepowered-v0.2.0-linux-x64.tar.gz
        dest-filename: kameorepowered.tar.gz
        sha256: 981fb29f54f8cc5796e34e3e260c51d60ae0bca3008aaaea94eaf955f789a5f7
        x-checker-data:
          type: json
          url: https://api.github.com/repos/birabittoh/KameoRePowered/releases
          version-query: .[0].tag_name
          url-query: .[0].assets[] | select(.name | test("^kameorepowered.*linux-x64.tar.gz")).browser_download_url
    build-commands:
      - tar -xf kameorepowered.tar.gz --no-same-owner
      - install -D -m755 kameorepowered -t /app/bin/
      - install -D -m644 lib*.so -t /app/lib/

  - name: freedesktop
    buildsystem: simple
    sources:
      - type: file
        path: io.github.birabittoh.kameorepowered.metainfo.xml
      - type: file
        path: io.github.birabittoh.kameorepowered.sh
      - type: file
        path: io.github.birabittoh.kameorepowered.png
      - type: inline
        dest-filename: io.github.birabittoh.kameorepowered.desktop
        contents: |
          [Desktop Entry]
          Categories=Game;AdventureGame
          Comment=A recompiled port of Kameo: Elements of Power
          Exec=io.github.birabittoh.kameorepowered.sh
          Icon=io.github.birabittoh.kameorepowered
          Keywords=xbox;kameo;rare
          Name=Kameo RePowered
          PrefersNonDefaultGPU=true
          StartupNotify=true
          Terminal=false
          TerminalOptions=
          Type=Application
    build-commands:
      - install -D -m644 io.github.birabittoh.kameorepowered.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -D -m644 ${FLATPAK_ID}.png /app/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      - install -D -m644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -D -m755 ${FLATPAK_ID}.sh -t /app/bin/
