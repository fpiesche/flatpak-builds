app-id: io.github.m0rb.heretic2r
runtime: org.freedesktop.Platform
runtime-version: &runtime-version '25.08'
x-gl-version: &gl-version '1.4'
x-gl-versions: &gl-versions 25.08;1.4
sdk: org.freedesktop.Sdk
command: io.github.m0rb.heretic2r.sh

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --allow=bluetooth

modules:
  - name: heretic2r
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/m0rb/Heretic2R-UNIX
        commit: 2597797b186f1ca698176d412cb4f0c41a8e7709
        x-checker-data:
          type: json
          url: https://api.github.com/repos/m0rb/Heretic2R-UNIX/branches/unix
          commit-query: .commit.sha
      - type: archive
        url: https://github.com/m-x-d/Heretic2R/raw/refs/heads/main/stuff/Heretic_II_Patch_106_for_H2R.zip
        dest-filename: h2e.zip
        dest: h2e
        sha256: 6e2e385c77c0ee8f8f04b2016e43533405f377f1d010a4e446e18893fdf516e3
      - type: file
        path: io.github.m0rb.heretic2r.sh
      - type: file
        path: io.github.m0rb.heretic2r.png
      - type: file
        path: io.github.m0rb.heretic2r.metainfo.xml
      - type: file
        path: io.github.m0rb.heretic2r.desktop
      - type: patch
        paths:
          - io.github.m0rb.heretic2r.cmake-install.patch
          - io.github.m0rb.heretic2r.homedir.patch
    post-install:
      - install -m644 -Dt /app/share/metainfo/ ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.metainfo.xml
      - install -m644 -Dt /app/share/icons/hicolor/256x256/apps/ ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.png
      - desktop-file-edit --set-key=Exec --set-value=${FLATPAK_ID}.sh ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.desktop
      - install -m644 -Dt /app/share/applications/ ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.desktop
      - install -m755 -Dt /app/bin/ ${FLATPAK_BUILDER_BUILDDIR}/${FLATPAK_ID}.sh
      - mkdir -p /app/share/games/h2e
      - cp -r ${FLATPAK_BUILDER_BUILDDIR}/h2e/* /app/share/games/h2e/
