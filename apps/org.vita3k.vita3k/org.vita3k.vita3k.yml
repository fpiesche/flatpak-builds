app-id: org.vita3k.vita3k
runtime: org.kde.Platform
runtime-version: &runtime-version '6.11'
sdk: org.kde.Sdk
command: Vita3K

finish-args:
  # X11
  - --socket=x11
  - --share=ipc
  # Hardware 3D, audio and network
  - --device=dri
  - --socket=pulseaudio
  - --share=network

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    add-ld-path: .
    version: *runtime-version
    autodownload: true
    autodelete: false

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/cmake

cleanup-commands:
  - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg

sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20

build-options:
  strip: true
  no-debuginfo: true

modules:
  - name: boost
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBOOST_INCLUDE_LIBRARIES=filesystem;icl;variant
    sources:
      - type: archive
        url: https://github.com/boostorg/boost/releases/download/boost-1.92.0.beta1/boost-1.92.0.beta1-cmake.tar.xz
        sha256: a60c3879ec1a262ac7a56c6badae4027c0ca5bed7b24f042bd9e7242f8389269
        x-checker-data:
          type: json
          url: https://api.github.com/repos/boostorg/boost/releases/latest
          version-query: .tag_name | sub("boost-"; "")
          url-query: .assets[] | select(.name | test("^boost-.*-cmake.tar.xz$")).browser_download_url

  - name: vita3k
    buildsystem: cmake-ninja
    builddir: true
    build-options:
      append-path: /usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        AR: llvm-ar
        CC: clang
        CXX: clang++
        RANLIB: llvm-ranlib
      ldflags: -fuse-ld=lld
    config-opts:
      - -DUSE_DISCORD_RICH_PRESENCE=OFF
      - -DVITA3K_FORCE_SYSTEM_BOOST=ON
      # - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: git
        url: https://github.com/fpiesche/Vita3K.git
        branch: patch-1
        # url: https://github.com/vita3k/Vita3K.git
        # commit: 05690eb3441cc34ef03cdde4fc633db1b3c52a97
        # x-checker-data:
        #   type: json
        #   url: https://api.github.com/repos/vita3k/vita3k/tags
        #   commit-query: .[0].commit.sha
      - type: patch
        paths:
          - org.vita3k.vita3k.flatpak-assetdir.patch
          - org.vita3k.vita3k.no-tracy-on-relwithdbginfo.patch
          - org.vita3k.vita3k.use-system-ffmpeg.patch
          - org.vita3k.vita3k.use-system-fmtlib.patch
          - org.vita3k.vita3k.use-system-sdl.patch
